    MigrationEstimationRequest:
      type: object
      description: Request payload for calculating migration time estimation
      properties:
        clusterId:
          type: string
          description: ID of the cluster to calculate migration estimation for
          example: "domain-c8"
          x-oapi-codegen-extra-tags:
            validate: "required"
        estimationSchema:
          type: array
          description: >
            Schemas to run. Valid values: "network-based", "storage-offload".
            If omitted, all schemas are run.
          items:
            type: string
        params:
          type: object
          description: >
            Optional calculator parameter overrides. Keys must match known calculator
            param names (e.g. "transfer_rate_mbps", "work_hours_per_day",
            "troubleshoot_mins_per_vm", "post_migration_engineers").
            User-supplied values take precedence over both defaults and
            inventory-derived values. Unknown keys are rejected with HTTP 400.
          additionalProperties: true
      required:
        - clusterId

    MigrationEstimationResponse:
      type: object
      description: >
        Migration estimation result, including per-schema results and the parameters used.
      required:
        - estimation
        - estimationContext
      properties:
        estimation:
          type: object
          description: Estimation results keyed by schema name (e.g. "network-based", "storage-offload").
          additionalProperties:
            $ref: "#/components/schemas/SchemaEstimationResult"
        estimationContext:
          $ref: "#/components/schemas/EstimationContext"
          description: Parameters used to compute the estimates.

    SchemaEstimationResult:
      type: object
      description: Estimation results for a single schema
      properties:
        minTotalDuration:
          type: string
          description: Minimum total estimated duration across all calculators
          example: "1h20m0s"
        maxTotalDuration:
          type: string
          description: Maximum total estimated duration across all calculators
          example: "5h20m0s"
        breakdown:
          type: object
          description: Per-calculator results
          additionalProperties:
            $ref: "#/components/schemas/EstimationDetail"
      required:
        - minTotalDuration
        - maxTotalDuration
        - breakdown

    EstimationDetail:
      type: object
      description: Detailed estimation result from a single calculator
      properties:
        duration:
          type: string
          description: Estimated duration for this component (point calculators only)
          example: "3h40m0s"
        minDuration:
          type: string
          description: Minimum estimated duration (ranged calculators only)
          example: "8m20s"
        maxDuration:
          type: string
          description: Maximum estimated duration (ranged calculators only)
          example: "33m20s"
        reason:
          type: string
          description: Explanation of how the estimation was calculated
      required:
        - reason

    MigrationComplexityRequest:
      type: object
      description: Request payload for calculating migration complexity estimation
      properties:
        clusterId:
          type: string
          description: ID of the cluster to calculate complexity estimation for
          example: "domain-c8"
          x-oapi-codegen-extra-tags:
            validate: "required"
      required:
        - clusterId

    MigrationComplexityResponse:
      type: object
      description: Migration complexity estimation results
      properties:
        complexityByDisk:
          type: array
          description: >
            Disk-size complexity scores, one entry per score level (1-4).
            Score 1 is the least complex disk footprint; score 4 is the most complex.
            Scores correspond to provisioned disk size: 1 (<=10 TB), 2 (<=20 TB),
            3 (<=50 TB), 4 (>50 TB). All four score levels are always present.
          items:
            $ref: "#/components/schemas/ComplexityDiskScoreEntry"
        complexityByOS:
          type: array
          description: >
            OS complexity scores, one entry per score level (0-4).
            Score 1 indicates the least complex OS to migrate; score 0 indicates an
            OS with unknown complexity. All five score levels are always present.
          items:
            $ref: "#/components/schemas/ComplexityOSScoreEntry"
        diskSizeRatings:
          type: object
          description: >
            Static lookup table mapping each disk-size tier label to its numeric complexity
            score. The content is identical for every cluster and reflects the DiskSizeScores
            configuration in the complexity package.
          additionalProperties:
            type: integer
        osRatings:
          type: object
          description: >
            Per-OS-name score for every OS found in this cluster's inventory. Keys are the
            OS name strings exactly as they appear in vms.osInfo; values are the numeric
            complexity score assigned by ClassifyOS (0 = unknown, 1-4 = increasing
            complexity). The map contains one entry per distinct OS name in the cluster,
            regardless of how many VMs run it.
          additionalProperties:
            type: integer
        complexityByOSName:
          type: array
          description: >
            Per-OS-name complexity breakdown. One entry per distinct OS name found in the
            cluster's inventory. Each entry carries the OS name string, its numeric
            complexity score (0–4), and the number of VMs running it.
          items:
            $ref: "#/components/schemas/ComplexityOSNameEntry"
      required:
        - complexityByDisk
        - complexityByOS
        - diskSizeRatings
        - osRatings
        - complexityByOSName

    ComplexityDiskScoreEntry:
      type: object
      description: One entry in the disk complexity breakdown
      properties:
        score:
          type: integer
          description: >
            Complexity score from 1 to 4, where 1 is the least complex disk footprint
            and 4 is the most complex. Score 1: <=10 TB provisioned; score 2: <=20 TB;
            score 3: <=50 TB; score 4: >50 TB.
        vmCount:
          type: integer
          description: Number of VMs at this complexity score
        totalSizeTB:
          type: number
          format: double
          description: Total provisioned storage in TB for VMs at this score
      required:
        - score
        - vmCount
        - totalSizeTB

    ComplexityOSScoreEntry:
      type: object
      description: One entry in the OS complexity breakdown
      properties:
        score:
          type: integer
          description: >
            Complexity score from 0 to 4, where 1 indicates the least complex OS
            to migrate and 0 indicates an OS with unknown complexity.
        vmCount:
          type: integer
          description: Number of VMs at this complexity score
      required:
        - score
        - vmCount

    ComplexityOSNameEntry:
      type: object
      description: One entry in the per-OS-name complexity breakdown.
      properties:
        osName:
          type: string
          description: >
            The OS name exactly as it appears in vms.osInfo (e.g.
            "Red Hat Enterprise Linux 9 (64-bit)").
        score:
          type: integer
          description: >
            Complexity score assigned by ClassifyOS. 0 = unknown, 1 = least
            complex, 4 = most complex.
        vmCount:
          type: integer
          description: Number of VMs running this OS.
      required:
        - osName
        - score
        - vmCount

    ClusterSizing:
      type: object
      description: Overall cluster sizing summary
      properties:
        totalNodes:
          type: integer
          description: Total number of nodes (worker + control plane)
        workerNodes:
          type: integer
          description: Number of worker nodes
        controlPlaneNodes:
          type: integer
          description: Number of control plane nodes
        failoverNodes:
          type: integer
          description: Number of failover nodes added for availability
        totalCPU:
          type: integer
          description: Total CPU cores across all nodes
        totalMemory:
          type: integer
          description: Total memory (GB) across all nodes
      required:
        - totalNodes
        - workerNodes
        - controlPlaneNodes
        - failoverNodes
        - totalCPU
        - totalMemory

    SizingResourceConsumption:
      type: object
      description: Resource consumption across the cluster
      properties:
        cpu:
          type: number
          format: double
          description: Total CPU requested
        memory:
          type: number
          format: double
          description: Total memory (GB) requested
        limits:
          $ref: "#/components/schemas/SizingResourceLimits"
        overCommitRatio:
          $ref: "#/components/schemas/SizingOverCommitRatio"
      required:
        - cpu
        - memory

    SizingResourceLimits:
      type: object
      description: Resource limits
      properties:
        cpu:
          type: number
          format: double
          description: Total CPU limits
        memory:
          type: number
          format: double
          description: Total memory (GB) limits
      required:
        - cpu
        - memory

    SizingOverCommitRatio:
      type: object
      description: Over-commit ratios
      properties:
        cpu:
          type: number
          format: double
          description: CPU over-commit ratio
        memory:
          type: number
          format: double
          description: Memory over-commit ratio
      required:
        - cpu
        - memory

    Job:
      type: object
      description: Background job for async assessment creation
      properties:
        id:
          type: integer
          format: int64
          description: Job ID
        status:
          $ref: "#/components/schemas/JobStatus"
        error:
          type: string
          description: Error message if job failed
        assessmentId:
          type: string
          format: uuid
          description: Assessment ID when job completed successfully
      required:
        - id
        - status

    JobStatus:
      type: string
      enum: [pending, parsing, validating, completed, failed, cancelled]
      description: >
        Job status:
         * `pending` - Job is queued
         * `parsing` - Parsing RVTools Excel file
         * `validating` - Running OPA VM validations
         * `completed` - Assessment created successfully
         * `failed` - Job failed with error
         * `cancelled` - Job was cancelled

    EstimationContext:
      type: object
      properties:
        schemas:
          type: array
          items:
            type: string
        params:
          type: object
          additionalProperties:
            type: number

    OsDiskEstimationEntry:
      type: object
      required:
        - score
        - vmCount
        - totalDiskSizeTB
      properties:
        score:
          type: integer
          description: "Combined OS+Disk complexity score (0-4)."
        vmCount:
          type: integer
          description: "Number of VMs at this complexity level."
        totalDiskSizeTB:
          type: number
          description: "Total provisioned disk across VMs in this bucket (decimal TB). 0.0 when ComplexityDistribution is absent from the inventory."
        estimation:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/SchemaEstimationResult'
          description: "Full estimation breakdown keyed by schema name. Absent for empty buckets (vmCount == 0)."

    MigrationEstimationByComplexityResponse:
      type: object
      required:
        - complexityByOsDisk
        - complexityMatrix
      properties:
        complexityByOsDisk:
          type: array
          items:
            $ref: '#/components/schemas/OsDiskEstimationEntry'
          description: "Combined OS+Disk complexity distribution with per-bucket estimation. All 5 score levels (0-4) always present."
        complexityMatrix:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: integer
          description: "Decision matrix: outer keys are OS scores (0-4), inner keys are disk scores (1-4), values are combined scores."
        estimationContext:
          $ref: '#/components/schemas/EstimationContext'
          description: "Parameters used to compute the estimates."

    Info:
      type: object
      description: OpenShift Migration Advisor information
      properties:
        gitCommit:
          type: string
          description: Git commit hash
          example: "c5a1661465a25b17ceeeb77d1ec40deb57d8da44"
        versionName:
          type: string
          description: Version name, based on git tag
          example: "0.1.4-40-gc5a1661"
        agentGitCommit:
          type: string
          nullable: true
          description: Agent git commit hash
          example: "c5a1661465a25b17ceeeb77d1ec40deb57d8da44"
        agentVersionName:
          type: string
          nullable: true
          description: Agent version name, based on git tag
          example: "0.1.4-40-gc5a1661"
      required:
        - gitCommit
        - versionName

    PartnerRequest:
