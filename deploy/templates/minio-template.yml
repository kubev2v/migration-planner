---
kind: Template
apiVersion: template.openshift.io/v1
metadata:
  name: migration-planner-minio
parameters:
  - name: MINIO_IMAGE
    description: MinIO container image
    value: quay.io/minio/minio
  - name: MINIO_IMAGE_TAG
    description: MinIO image tag
    value: latest
  - name: MINIO_ROOT_USER
    description: MinIO root user (S3 access key)
    value: admin
  - name: MINIO_ROOT_PASSWORD
    description: MinIO root password (S3 secret key)
    value: password
objects:
  - apiVersion: v1
    kind: Service
    metadata:
      name: migration-planner-minio
      labels:
        app: migration-planner-minio
    spec:
      ports:
        - name: api
          port: 9000
          protocol: TCP
          targetPort: 9000
      selector:
        app: migration-planner-minio
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: migration-planner-minio
      labels:
        app: migration-planner-minio
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: migration-planner-minio
      template:
        metadata:
          labels:
            app: migration-planner-minio
        spec:
          containers:
            - name: minio
              image: ${MINIO_IMAGE}:${MINIO_IMAGE_TAG}
              imagePullPolicy: IfNotPresent
              args:
                - server
                - /data
              env:
                - name: MINIO_ROOT_USER
                  value: ${MINIO_ROOT_USER}
                - name: MINIO_ROOT_PASSWORD
                  value: ${MINIO_ROOT_PASSWORD}
              ports:
                - containerPort: 9000
                  name: api
              readinessProbe:
                tcpSocket:
                  port: 9000
                initialDelaySeconds: 5
                periodSeconds: 5
              livenessProbe:
                tcpSocket:
                  port: 9000
                initialDelaySeconds: 10
                periodSeconds: 20
              volumeMounts:
                - name: data
                  mountPath: /data
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: data
              emptyDir: {}
