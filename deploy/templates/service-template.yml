---
kind: Template
apiVersion: template.openshift.io/v1
metadata:
  name: assisted-migration-service
parameters:
  # Migration Planner Service
  - name: MIGRATION_PLANNER_IMAGE
    required: true
  - name: MIGRATION_PLANNER_IMAGE_TAG
    value: latest
  - name: MIGRATION_PLANNER_REPLICAS
    description: Number of replicas of the service to run.
    value: "3"
  - name: MIGRATION_PLANNER_MEMORY_REQUEST
    description: Memory request for the API pods.
    value: "400Mi"
  - name: MIGRATION_PLANNER_MEMORY_LIMIT
    description: Memory limit for the API pods.
    value: "2000Mi"
  - name: MIGRATION_PLANNER_CPU_REQUEST
    description: CPU request for the API pods.
    value: "300m"
  - name: MIGRATION_PLANNER_CPU_LIMIT
    description: CPU limit for the API pods.
    value: "500m"
  - name: MIGRATION_PLANNER_AGENT_IMAGE
    description: Migration Discovery Service image
    required: true
  - name: MIGRATION_PLANNER_AGENT_URL
    description: The service URL valid to the service from the agent
    required: true
  - name: MIGRATION_PLANNER_UI_URL
    description: The UI URL valid to the service from the agent
    required: true
  
  # Migration Planner UI
  - name: MIGRATION_PLANNER_UI_IMAGE
    required: true
  - name: MIGRATION_PLANNER_UI_IMAGE_TAG
    value: latest
  
  # Postgres
  - name: DB_SERVICE_NAME
    description: The name of the OpenShift Service exposed for the database.
    displayName: Database Service Name
    value: migration-planner-postgres
  - name: DB_SECRET_NAME
    description: The name of the OpenShift Secret used for the database.
    displayName: Database Secret Name
    value: migration-planner-rds
  - name: DB_USER
    description: Username for PostgreSQL user that will be used for accessing the database.
    displayName: PostgreSQLUsername
    value: admin
  - name: DB_PASSWORD
    description: Password for the PostgreSQL connection user.
    displayName: PostgreSQL Password
    value: adminpass
  - name: DB_NAME
    description: Name of the PostgreSQL database accessed.
    displayName: PostgreSQL Database Name
    value: planner
  - name: POSTGRES_IMAGE
    description: Postgres image (14 or latest).
    displayName: Postgres Image
    value: quay.io/sclorg/postgresql-12-c8s
  - name: DB_VOLUME_CAPACITY
    description: Volume space available for data, e.g. 512Mi, 2Gi.
    displayName: Volume Capacity
    value: 512Mi

objects:
  # Migration Planner Service
  - kind: ServiceAccount
    apiVersion: v1
    metadata:
      name: migration-planner
  - kind: Secret
    apiVersion: v1
    metadata:
      name: migration-planner-secret
    type: Opaque
    stringData:
      config_server: ${MIGRATION_PLANNER_AGENT_URL}
      config_server_ui: ${MIGRATION_PLANNER_UI_URL}/migrate/wizard
  - kind: Service
    apiVersion: v1
    metadata:
      labels:
        app: migration-planner
      name: migration-planner
    spec:
      ports:
        - name: migration-planner
          port: 3443
          protocol: TCP
          targetPort: 3443
      selector:
        app: migration-planner
  - kind: Service
    apiVersion: v1
    metadata:
      labels:
        app: migration-planner
      name: migration-planner-agent
    spec:
      ports:
        - name: migration-planner-agent
          port: 7443
          protocol: TCP
          targetPort: 7443
      selector:
        app: migration-planner
  - kind: Deployment
    apiVersion: apps/v1 # for versions before 1.9.0 use apps/v1beta2
    metadata:
      name: migration-planner
    spec:
      selector:
        matchLabels:
          app: migration-planner
      replicas: ${{MIGRATION_PLANNER_REPLICAS}}
      template:
        metadata:
          labels:
            app: migration-planner
        spec:
          containers:
            - name: migration-planner
              resources:
                requests:
                  cpu: ${MIGRATION_PLANNER_CPU_REQUEST}
                  memory: ${MIGRATION_PLANNER_MEMORY_REQUEST}
                limits:
                  cpu: ${MIGRATION_PLANNER_CPU_LIMIT}
                  memory: ${MIGRATION_PLANNER_MEMORY_LIMIT}
              image: ${MIGRATION_PLANNER_IMAGE}:${MIGRATION_PLANNER_IMAGE_TAG}
              imagePullPolicy: Always
              ports:
                - containerPort: 3443
              livenessProbe:
                httpGet:
                  path: /health
                  port: 3443
                initialDelaySeconds: 30
              env:
                - name: CONFIG_SERVER
                  valueFrom:
                    secretKeyRef:
                      name: migration-planner-secret
                      key: config_server
                - name: CONFIG_SERVER_UI
                  valueFrom:
                    secretKeyRef:
                      name: migration-planner-secret
                      key: config_server_ui
                - name: MIGRATION_PLANNER_AGENT_IMAGE
                  value: ${MIGRATION_PLANNER_AGENT_IMAGE}
                - name:  INSECURE_REGISTRY
                  value: "true"
              volumeMounts:
                - name: migration-planner-config
                  mountPath: "/.migration-planner/config.yaml"
                  subPath: config.yaml
                  readOnly: true
          serviceAccountName: migration-planner
          volumes:
            - name: migration-planner-config
              secret:
                secretName: ${DB_SECRET_NAME}
                items:
                  - key: config.yaml
                    path: config.yaml
  
  # Migration Planner UI
  - kind: Deployment
    apiVersion: apps/v1
    metadata:
      name: migration-planner-ui
    spec:
      replicas: ${{MIGRATION_PLANNER_REPLICAS}}
      selector:
        matchLabels:
          app: migration-planner-ui
      template:
        metadata:
          labels:
            app: migration-planner-ui
        spec:
          containers:
            - name: migration-planner-ui
              image: ${MIGRATION_PLANNER_UI_IMAGE}:${MIGRATION_PLANNER_UI_IMAGE_TAG}
              imagePullPolicy: Always
              ports:
                - containerPort: 8080
          restartPolicy: Always
  - kind: Service
    apiVersion: v1
    metadata:
      name: migration-planner-ui
    spec:
      ports:
        - port: 8080
          targetPort: 8080
          protocol: TCP
      selector:
        app: migration-planner-ui
  
  # Postgres
  - kind: Service
    apiVersion: v1
    metadata:
      name: ${DB_SERVICE_NAME}
      labels:
        app: ${DB_SERVICE_NAME}
    spec:
      ports:
        - port: 5432
          targetPort: 5432
          protocol: TCP
      selector:
        app: ${DB_SERVICE_NAME}
  - kind: Deployment
    apiVersion: apps/v1
    metadata:
      name: ${DB_SERVICE_NAME}
    spec:
      selector:
        matchLabels:
          app: ${DB_SERVICE_NAME}
      replicas: 1
      template:
        metadata:
          labels:
            app: ${DB_SERVICE_NAME}
        spec:
          containers:
            - name: postgres
              image: ${POSTGRES_IMAGE}
              imagePullPolicy: IfNotPresent
              ports:
                - containerPort: 5432
                  protocol: TCP
              env:
                - name: POSTGRESQL_DATABASE
                  valueFrom:
                    secretKeyRef:
                      name: ${DB_SECRET_NAME}
                      key: db.name
                - name: POSTGRESQL_USER
                  valueFrom:
                    secretKeyRef:
                      name: ${DB_SECRET_NAME}
                      key: db.user
                - name: POSTGRESQL_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: ${DB_SECRET_NAME}
                      key: db.password
              volumeMounts:
                - mountPath: /var/lib/pgsql/data
                  name: ${DB_SERVICE_NAME}-data
              resources:
                limits:
                  memory: 500Mi
                requests:
                  cpu: 100m
                  memory: 400Mi
              livenessProbe:
                tcpSocket:
                  port: 5432
                initialDelaySeconds: 120
                timeoutSeconds: 10
              readinessProbe:
                exec:
                  command:
                  - /bin/sh
                  - -c
                  - exec /usr/bin/pg_isready -U $POSTGRESQL_USER -d $POSTGRESQL_DATABASE -h localhost -p 5432
                initialDelaySeconds: 5
                timeoutSeconds: 1
              securityContext:
                capabilities: {}
                privileged: false
              terminationMessagePath: /dev/termination-log
              capabilities: {}
          dnsPolicy: ClusterFirst
          restartPolicy: Always
          volumes:
            - name: ${DB_SERVICE_NAME}-data
              persistentVolumeClaim:
                claimName: ${DB_SERVICE_NAME}-data
  - kind: Secret
    apiVersion: v1
    metadata:
      name: ${DB_SECRET_NAME}
      labels:
        app: postgres
    type: Opaque
    stringData:
      config.yaml: |
        database:
          hostname: ${DB_SERVICE_NAME}
          name: ${DB_NAME}
          password: ${DB_PASSWORD}
          port: 5432
          type: pgsql
          user: ${DB_USER}
        service:
          address: :3443
          agentEndpointAddress: :7443
          baseAgentEndpointUrl: https://localhost:7443
          baseUrl: https://localhost:3443
          logLevel: debug
      db.host: ${DB_SERVICE_NAME}
      db.name: ${DB_NAME}
      db.port: "5432"
      db.user: ${DB_USER}
      db.password: ${DB_PASSWORD}
  - kind: PersistentVolumeClaim
    apiVersion: v1
    metadata:
      name: ${DB_SERVICE_NAME}-data
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: ${DB_VOLUME_CAPACITY}
