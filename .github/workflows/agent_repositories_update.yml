name: React to Agent Repositories Changes

on:
  repository_dispatch:
    types: [remote_repo_updated]

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    concurrency:
      group: agent-repositories-update
      cancel-in-progress: true
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: "update-agent-repositories"
      MIGRATION_PLANNER_AGENT_REPO_NAME: "kubev2v/assisted-migration-agent"
      MIGRATION_PLANNER_AGENT_UI_REPO_NAME: "kubev2v/migration-planner-agent-ui"
      CONFIG_FILE: "build/migration-planner-iso/config"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Read payload
        id: payload
        env:
          SHA: ${{ github.event.client_payload.sha }}
          REPO: ${{ github.event.client_payload.repo }}
        run: |
          echo "new_sha=$SHA" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT

      - name: Update file
        if: ${{ steps.payload.outputs.repo == env.MIGRATION_PLANNER_AGENT_UI_REPO_NAME }}
        id: update
        env:
          NEW_SHA: ${{ steps.payload.outputs.new_sha }}
        run: |
          sed -i "s/^AGENT_UI_IMAGE_TAG=.*/AGENT_UI_IMAGE_TAG=$NEW_SHA/" "$CONFIG_FILE"
          grep -q "^AGENT_UI_IMAGE_TAG=$NEW_SHA" "$CONFIG_FILE" || { echo "ERROR: sed substitution failed"; exit 1; }

      - name: Update agent submodule
        if: ${{ steps.payload.outputs.repo == env.MIGRATION_PLANNER_AGENT_REPO_NAME }}
        id: update-submodule
        env:
          NEW_SHA: ${{ steps.payload.outputs.new_sha }}
        run: |
          echo "Updating agent submodule to ${NEW_SHA}"
          git submodule update --init agent-v2
          git -C agent-v2 fetch origin "${NEW_SHA}"
          git -C agent-v2 checkout --detach "${NEW_SHA}"
          git add agent-v2

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.MIGRATION_PLANNER_SYNC_APP_ID }}
          private-key: ${{ secrets.MIGRATION_PLANNER_SYNC_APP_PRIVATE_KEY }}
          owner: kubev2v

      - name: Create Pull Request
        if: ${{ steps.payload.outputs.repo == env.MIGRATION_PLANNER_AGENT_UI_REPO_NAME ||
          steps.payload.outputs.repo == env.MIGRATION_PLANNER_AGENT_REPO_NAME }}
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: ${{ env.BRANCH_NAME }}
          commit-message: |
            NO-JIRA | ci: Trigger Konflux pipeline. 
            Changes to the agent repo or the agent-ui have been detected.
          title: "[AUTOMATION] Update Agent submodule or Agent-UI"
          body: |
            Auto update triggered by ${{ steps.payload.outputs.repo }}.
          delete-branch: true
