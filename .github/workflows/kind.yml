name: Run e2e test

on:
  workflow_dispatch:
  push:
    branches: [main, stable]
  pull_request:
    branches: [main, stable]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y qemu-utils sshpass libvirt-dev \
            libvirt-daemon libvirt-daemon-system
          sudo systemctl restart libvirtd

      - name: Generate private key for planner local auth method
        run: |
          sudo mkdir -p /etc/planner/e2e
          sudo chown -R $(whoami):$(whoami) /etc/planner/e2e
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 \
            -out /etc/planner/e2e/private-key
          openssl rsa -in /etc/planner/e2e/private-key \
            -out /etc/planner/e2e/private-key -traditional
          echo "E2E_PRIVATE_KEY_FOLDER_PATH=/etc/planner/e2e" >> $GITHUB_ENV

      - name: Build e2e binary
        run: make build-e2e

      - name: Determine image tag
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAG="on-pr-${{ github.event.pull_request.head.sha }}"
          else
            TAG="${{ github.sha }}"
          fi
          echo "IMAGE_TAG=${TAG}" >> $GITHUB_ENV

          REGISTRY="quay.io/redhat-user-workloads/assisted-migration-tenant"
          echo "E2E_API_IMAGE=${REGISTRY}/migration-planner-api:${TAG}" >> $GITHUB_ENV
          echo "E2E_ISO_IMAGE=${REGISTRY}/migration-planner-rhcos-iso:${TAG}" >> $GITHUB_ENV    

      - name: Wait for Konflux images
        timeout-minutes: 60
        run: |
          for image in "$E2E_API_IMAGE" "$E2E_ISO_IMAGE"; do
            echo "Waiting for ${image}..."
            until skopeo inspect --no-tags "docker://${image}" > /dev/null 2>&1; do
              echo "  Not ready yet, retrying in 30s..."
              sleep 30
            done
            echo "  Found: ${image}"
          done

      - name: Run e2e tests
        run: |
          sudo -E ./bin/e2e \
            --api-image="${E2E_API_IMAGE}" \
            --iso-image="${E2E_ISO_IMAGE}" 

      - name: Collect logs
        if: always()
        run: |
          kubectl get deploy -o yaml 2>/dev/null || true
          kubectl get pods -o wide 2>/dev/null || true
          for pod in $(kubectl get pods -o name 2>/dev/null); do
            echo "=== Logs for ${pod} ==="
            kubectl logs ${pod} --all-containers 2>/dev/null || true
            echo "=== Describe ${pod} ==="
            kubectl describe ${pod} 2>/dev/null || true
            echo "======================="
          done
